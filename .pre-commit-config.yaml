repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: python
        types_or: [python, pyi]
        require_serial: true
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: python
        types_or: [ python, pyi ]
        require_serial: true
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: python
        types_or: [ python, pyi ]
        stages: [pre-push]

      - id: tests
        name: tests
        entry: uv run pytest
        language: python
        stages: [pre-push]
